<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Immersive Liuyao Reading</title>
    <link rel="stylesheet" href="./reading.css" />
  </head>
  <body>
    <main class="reading-shell">
      <section class="hero">
        <div class="sigil" aria-hidden="true">
          <span>六</span>
          <span>爻</span>
        </div>
        <p class="eyebrow">AI Liuyao Oracle</p>
        <h1 id="title">The Six Lines Are Opening</h1>
        <p id="question" class="question"></p>
      </section>

      <section class="oracle-grid">
        <div class="hexagram-vessel">
          <div class="hexagram-label">
            <span>Primary Hexagram</span>
            <strong id="primary-name">-</strong>
          </div>
          <div id="primary-lines" class="immersive-lines"></div>
          <div class="hexagram-label secondary">
            <span>Changed Hexagram</span>
            <strong id="changed-name">-</strong>
          </div>
        </div>

        <article class="interpretive-scroll">
          <p class="eyebrow">Oracle Interpretation</p>
          <h2 id="omen-title">-</h2>
          <section>
            <h3>Core Omen</h3>
            <p id="core-omen">-</p>
          </section>
          <section>
            <h3>Changing Energy</h3>
            <p id="changing-energy">-</p>
          </section>
          <section>
            <h3>Useful God</h3>
            <p id="useful-god">-</p>
          </section>
          <section>
            <h3>Guidance</h3>
            <p id="guidance">-</p>
          </section>
          <section>
            <h3>What To Avoid</h3>
            <p id="avoid">-</p>
          </section>
          <p id="closing" class="closing"></p>
        </article>
      </section>

      <section class="oracle-details">
        <div><span>Moving Lines</span><strong id="moving-lines">-</strong></div>
        <div><span>Trend</span><strong id="trend">-</strong></div>
        <div><span>Mutual Hexagram</span><strong id="mutual-name">-</strong></div>
        <div><span>Casting Method</span><strong id="method">-</strong></div>
      </section>
    </main>

    <script type="module" src="./reading.js"></script>
  </body>
</html>
